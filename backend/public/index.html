<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randevu Kurtaran - Kayıt Paneli</title>
    <style>
        body { font-family: sans-serif; background: #1e3c72; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-sizing: border-box; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn { background: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .success { display: none; text-align: center; }
        .link { color: #1e3c72; font-weight: bold; display: block; margin-top: 15px; word-break: break-all; }
    </style>
</head>
<body>

<div class="box">
    <div id="formView">
        <h2>🗓 Randevu Kurtaran</h2>
        <form id="regForm">
            <div class="form-group">
                <label>İşletme Adı</label>
                <input type="text" id="companyName" required placeholder="Örn: Star Berber Salonu">
            </div>
            <div class="form-group">
                <label>Sektör</label>
                <select id="sectorType">
                    <option value="Berber / Erkek Kuaförü">Berber / Erkek Kuaförü</option>
                    <option value="Güzellik & Saç Salonu">Güzellik & Saç Salonu</option>
                </select>
            </div>
            <div class="form-group">
                <label>Telefon</label>
                <input type="tel" id="phone" required placeholder="Örn: 05551234567">
            </div>
            <button type="submit" class="btn">7 Günlük Ücretsiz Denemeyi Başlat</button>
        </form>
    </div>

    <div id="successView" class="success">
        <h2>🎉 Kayıt Başarılı!</h2>
        <p>Müşteri Randevu Linkiniz:</p>
        <a id="resLink" class="link" href="#" target="_blank">Yükleniyor...</a>
    </div>
</div>

<script>
    document.getElementById('regForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const companyName = document.getElementById('companyName').value;
        const sectorType = document.getElementById('sectorType').value;
        const phone = document.getElementById('phone').value;
        
        try {
            // Sunucuya tam adresle (güvenli yönlendirme) istek atıyoruz
            const response = await fetch(`${window.location.origin}/api/register-business`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ companyName, sectorType, phone })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                document.getElementById('formView').style.display = 'none';
                document.getElementById('successView').style.display = 'block';
                
                const fullUrl = `${window.location.origin}/${data.slug}`;
                document.getElementById('resLink').innerText = fullUrl;
                document.getElementById('resLink').href = fullUrl;
            } else {
                alert("Sunucudan Gelen Hata: " + (data.message || "Bilinmeyen arıza"));
            }
        } catch (error) {
            alert("Ağ Bağlantı Hatası: " + error.message);
        }
    });
</script>

</body>
</html>
