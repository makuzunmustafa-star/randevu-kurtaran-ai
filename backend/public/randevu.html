<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randevu Al - Yapay Zeka Akıllı Takvimi</title>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .booking-container { background: #1e293b; padding: 32px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4); width: 100%; max-width: 450px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #38bdf8; text-align: center; }
        .subtitle { font-size: 14px; color: #94a3b8; text-align: center; margin-bottom: 24px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #cbd5e1; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #f8fafc; font-size: 15px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #38bdf8; }
        .btn-submit { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 10px; }
        .btn-submit:hover { background: #0ea5e9; }
        .btn-submit:active { transform: scale(0.98); }
        .appointments-list { margin-top: 24px; border-top: 1px solid #334155; padding-top: 20px; }
        .appointments-list h3 { font-size: 14px; color: #94a3b8; text-transform: uppercase; margin-bottom: 12px; }
        .appointment-item { background: #0f172a; padding: 10px 14px; border-radius: 8px; font-size: 13px; color: #e2e8f0; margin-bottom: 8px; border-left: 4px solid #34d399; display: flex; justify-content: space-between; }
        .appointment-item.canceled { border-left-color: #f87171; text-decoration: line-through; color: #64748b; }
    </style>
</head>
<body>

<div class="booking-container">
    <h1 id="shopName">💈 Yükleniyor...</h1>
    <p class="subtitle">Müşteri Paneli: Adınızı yazın, dilediğiniz gün ve saati seçerek anında randevu oluşturun.</p>
    
    <form id="appointmentForm">
        <div class="form-group">
            <label>👤 Adınız Soyadınız</label>
            <input type="text" id="musteriAdi" placeholder="Örn: Mustafa Uzun" required>
        </div>
        
        <div class="form-group">
            <label>📅 Randevu Günü Seçin</label>
            <input type="date" id="randevuTarihi" required>
        </div>
        
        <div class="form-group">
            <label>⏰ Uygun Saat Seçin</label>
            <select id="randevuSaati" required>
                <option value="09:00">09:00</option>
                <option value="10:00">10:00</option>
                <option value="11:00">11:00</option>
                <option value="13:00">13:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>
                <option value="18:00">18:00</option>
            </select>
        </div>
        
        <button type="submit" class="btn-submit">Randevuyu Kesinleştir</button>
    </form>

    <div class="appointments-list">
        <h3>📅 Güncel Alınan Randevular</h3>
        <div id="liveAppointments">
            <!-- Mevcut randevular buraya listelenecek -->
        </div>
    </div>
</div>

<script>
  <script>
    // URL'den slug değerini temiz ve hatasız şekilde ayıklayan kesin çözüm
    const pathName = window.location.pathname.replace(/^\/|\/$/g, ''); 
    const pathSegments = pathName.split('/');
    // Eğer /dashboard/berber-mustafa ise son segmenti al, sadece /berber-mustafa ise yine onu al
    const dukkanSlug = pathSegments[pathSegments.length - 1].toLowerCase().trim();

    async function loadShopDetails() {
        if (!dukkanSlug || dukkanSlug === 'dashboard') return;
        try {
            const res = await fetch(`/api/dukkan-detay/${dukkanSlug}`);
            const data = await res.json();

            // data.dukkan nesnesi ve data.dukkan.name değeri varsa içeriği bas
            if (data.success && data.dukkan && data.dukkan.name) {
                document.getElementById('shopName').innerText = `💈 ${data.dukkan.name}`;
                
                const listDiv = document.getElementById('liveAppointments');
                listDiv.innerHTML = '';
                
                if (data.randevular && data.randevular.length > 0) {
                    data.randevular.forEach(r => {
                        const isCanceled = r.durum === 'IPTAL';
                        listDiv.innerHTML += `
                            <div class="appointment-item ${isCanceled ? 'canceled' : ''}">
                                <span><strong>${r.musteri_adi}</strong></span>
                                <span>📅 ${r.randevu_tarihi} - ⏰ ${r.randevu_saati}</span>
                            </div>
                        `;
                    });
                } else {
                    listDiv.innerHTML = '<p style="font-size:12px; color:#64748b; margin:0;">Henüz alınan randevu yok. İlk randevuyu siz alın!</p>';
                }
            } else {
                document.getElementById('shopName').innerText = `❌ İşletme Bulunamadı`;
            }
        } catch (e) {
            console.error("Dükkan bilgileri yüklenirken hata:", e);
            document.getElementById('shopName').innerText = `❌ Bağlantı Hatası`;
        }
    }

    document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const musteriAdi = document.getElementById('musteriAdi').value;
        const randevuTarihi = document.getElementById('randevuTarihi').value;
        const randevuSaati = document.getElementById('randevuSaati').value;

        try {
            const res = await fetch('/api/book-appointment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dukkanSlug, musteriAdi, randevuTarihi, randevuSaati })
            });
            const data = await res.json();

            if (data.success) {
                alert(data.message);
                document.getElementById('appointmentForm').reset();
                loadShopDetails();
            } else {
                alert("Hata: " + data.message);
            }
        } catch (error) {
            console.error("Randevu kaydedilirken hata:", error);
            alert("Sistemde bir hata oluştu.");
        }
    });

    loadShopDetails();
</script>
