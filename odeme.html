<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randevu Kurtaran - Ödeme ve Kayıt</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #2ecc71; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background: #27ae60; }
        #statusMessage { margin-top: 15px; padding: 10px; border-radius: 6px; text-align: center; font-size: 14px; display: none; }
        .success { background: #e8f8f5; color: #2ecc71; border: 1px solid #2ecc71; }
        .error { background: #fdedec; color: #e74c3c; border: 1px solid #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗓️ Randevu Kurtaran</h2>
    <form id="appointmentForm">
        <div class="form-group">
            <label>Adınız Soyadınız</label>
            <input type="text" id="isim" placeholder="Ahmet Yılmaz" required>
        </div>
        <div class="form-group">
            <label>Telefon Numaranız</label>
            <input type="tel" id="telefon" placeholder="05551234567" required>
        </div>
        <div class="form-group">
            <label>Randevu Tarihi</label>
            <input type="date" id="tarih" required>
        </div>
        <div class="form-group">
            <label>Randevu Saati</label>
            <input type="time" id="saat" required>
        </div>
        <button type="submit">Ödeme Yap ve Randevu Al</button>
    </form>
    <div id="statusMessage"></div>
</div>

<script>
    document.getElementById('appointmentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const statusDiv = document.getElementById('statusMessage');
        statusDiv.style.display = 'block';
        statusDiv.className = '';
        statusDiv.innerText = 'İstek gönderiliyor...';

        const formData = {
            isim: document.getElementById('isim').value,
            telefon: document.getElementById('telefon').value,
            tarih: document.getElementById('tarih').value,
            saat: document.getElementById('saat').value
        };

        try {
            // URL doğrudan localhost sunucumuza (Port 3000) yönlendirildi
            const response = await fetch('http://localhost:3000/api/randevu', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (result.success) {
                statusDiv.className = 'success';
                statusDiv.innerText = result.message;
                document.getElementById('appointmentForm').reset();
            } else {
                statusDiv.className = 'error';
                statusDiv.innerText = result.message;
            }
        } catch (error) {
            console.error('Bağlantı Hatası:', error);
            statusDiv.className = 'error';
            statusDiv.innerText = 'Sunucuya bağlanılamadı! Lütfen "node app.js" sunucusunun açık olduğundan emin olun.';
        }
    });
</script>
</body>
</html>
